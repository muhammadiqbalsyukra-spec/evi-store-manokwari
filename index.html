<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EVI STORE MANOKWARI</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f1f1f1;
}

/* Navbar */
.navbar {
  background: #2196F3;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 18px;
}

/* Search */
.search-box {
  padding: 10px;
  text-align: center;
}

.search-box input {
  width: 90%;
  padding: 8px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* Produk */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
  gap: 15px;
  padding: 15px;
}

.produk {
  background: white;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
}

.produk img {
  width: 100%;
  border-radius: 8px;
}

.harga {
  color: red;
  font-weight: bold;
}

/* Button */
.btn {
  background: green;
  color: white;
  padding: 7px;
  border-radius: 6px;
  display: block;
  margin-top: 5px;
  cursor: pointer;
}

/* Cart */
.cart {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  border-top: 2px solid #ccc;
  padding: 10px;
}

</style>
</head>

<body>

<div class="navbar">🛒 EVI STORE MANOKWARI</div>

<div class="search-box">
  <input type="text" id="search" placeholder="Cari produk..." onkeyup="cariProduk()">
</div>

<div class="container" id="produkList">

  <div class="produk">
    <img src="https://i.ibb.co/FLfZwRHd/623cb0a1b0f536e26daf040d290fa49a-jpg-720x720q80-jpg.webp">
    <h3>Sunlight</h3>
    <div class="harga">10000</div>
    <div class="btn" onclick="tambah('Sunlight',10000)">Tambah</div>
  </div>

  <div class="produk">
    <img src="https://i.ibb.co/9HcY9T3x/CM-DETTUB1062-Dettol-Floor-Cleaner-Lavender-Pouch-700-m-L.webp">
    <h3>Dettol Floor Cleaner</h3>
    <div class="harga">18000</div>
    <div class="btn" onclick="tambah('Dettol Floor Cleaner',18000)">Tambah</div>
  </div>

</div>

<div class="cart">
  Total: Rp <span id="total">0</span>
  <button onclick="checkout()">Checkout</button>
</div>

<script>
let total = 0;
let pesan = "";

function tambah(nama, harga){
  total += harga;
  pesan += nama + "%0A";
  document.getElementById("total").innerText = total;
}

function checkout(){
  window.location.href = "https://wa.me/6282285712293?text=Pesanan:%0A" + pesan + "Total: Rp " + total;
}

function cariProduk(){
  let input = document.getElementById("search").value.toLowerCase();
  let produk = document.getElementsByClassName("produk");

  for(let i=0;i<produk.length;i++){
    let nama = produk[i].innerText.toLowerCase();
    produk[i].style.display = nama.includes(input) ? "" : "none";
  }
}
</script>

</body>
</html>
