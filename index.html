<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EVI STORE MANOKWARI</title>

<style>
body {font-family:Arial;margin:0;background:#f5f5f5;}
.navbar {background:#222;color:white;padding:15px;text-align:center;}
.admin-btn {position:fixed;top:10px;right:10px;background:orange;padding:8px;border-radius:8px;cursor:pointer;}

.container {
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:10px;padding:10px;
}

.produk {
background:white;padding:10px;border-radius:10px;text-align:center;
}

.produk img {width:100%;}
.harga {color:red;font-weight:bold;}
.stok {font-size:12px;color:#666;}

.cart {
position:fixed;bottom:0;width:100%;
background:white;padding:10px;border-top:2px solid #ccc;
}

/* popup */
.popup {
display:none;position:fixed;top:20%;left:10%;width:80%;
background:white;padding:15px;border-radius:10px;
}
.popup input {width:100%;margin:5px 0;padding:8px;}
</style>

</head>
<body>

<div class="navbar">🔥 TOKO ULTIMATE</div>
<div class="admin-btn" onclick="login()">Admin</div>

<div class="container" id="produk"></div>

<div class="cart">
Total: Rp <span id="total">0</span>
<button onclick="checkout()">Checkout</button>
</div>

<!-- popup -->
<div class="popup" id="popup">
<h3>Tambah Produk</h3>
<input id="nama" placeholder="Nama">
<input id="harga" placeholder="Harga">
<input id="stok" placeholder="Stok">
<input id="gambar" placeholder="Link gambar">
<button onclick="tambah()">Simpan</button>
</div>

<script>
let PASSWORD = "071095";

let data = JSON.parse(localStorage.getItem("produk")) || [
{nama:"Sunlight",harga:10000,stok:5,gambar:"https://i.ibb.co/FLfZwRHd/623cb0a1b0f536e26daf040d290fa49a-jpg-720x720q80-jpg.webp"},
{nama:"Dettol Floor Cleaner",harga:18000,stok:3,gambar:"https://i.ibb.co/9HcY9T3x/CM-DETTUB1062-Dettol-Floor-Cleaner-Lavender-Pouch-700-m-L.webp"}
];

let total=0;
let pesanan="";

function tampil(){
let html="";
data.forEach((p,i)=>{
html+=`
<div class="produk">
<img src="${p.gambar}">
<h4>${p.nama}</h4>
<div class="harga">Rp ${p.harga}</div>
<div class="stok">Stok: ${p.stok}</div>
<button onclick="beli(${i})">Tambah</button>
<button onclick="hapus(${i})">Hapus</button>
</div>`;
});
document.getElementById("produk").innerHTML=html;
}
tampil();

function beli(i){
if(data[i].stok<=0){alert("Stok habis");return;}
data[i].stok--;
total+=data[i].harga;
pesanan+=data[i].nama+"%0A";
document.getElementById("total").innerText=total;
localStorage.setItem("produk",JSON.stringify(data));
tampil();
}

function hapus(i){
data.splice(i,1);
localStorage.setItem("produk",JSON.stringify(data));
tampil();
}

function checkout(){
window.location.href="https://wa.me/6282285712293?text=Pesanan:%0A"+pesanan+"Total: Rp "+total;
}

function login(){
let pass=prompt("Masukkan password admin:");
if(pass===PASSWORD){
document.getElementById("popup").style.display="block";
}else{
alert("Salah!");
}
}

function tambah(){
let n=nama.value;
let h=harga.value;
let s=stok.value;
let g=gambar.value;

data.push({nama:n,harga:parseInt(h),stok:parseInt(s),gambar:g});
localStorage.setItem("produk",JSON.stringify(data));
popup.style.display="none";
tampil();
}
</script>

</body>
</html>
