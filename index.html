<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EVI STORE MANOKWARI</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

header {
  background: linear-gradient(135deg,#ff6600,#ff9900);
  color: white;
  text-align: center;
  padding: 20px;
}

/* GRID 2 KOLOM */
.container {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 10px;
  padding: 10px;
}

.card {
  background: white;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 3px 8px rgba(0,0,0,0.1);
}
.card img {
  width: 100%;
  height: 120px;
  object-fit: cover;
}
.card h3 {
  margin: 8px;
  font-size: 13px;
}
.card p {
  margin: 8px;
  color: #ff6600;
  font-weight: bold;
  font-size: 12px;
}
.card button {
  margin: 8px;
  padding: 6px;
  width: 90%;
  border: none;
  background: #25D366;
  color: white;
  border-radius: 5px;
  font-size: 12px;
}

/* MODAL */
#modal {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}
.modal-content {
  background:white;
  padding:20px;
  border-radius:10px;
  width:300px;
}

.more-text {
  text-align:center;
  margin:20px;
  font-weight:bold;
}
</style>
</head>

<body>

<header>
<h1>EVI STORE MANOKWARI</h1>
<p>Homecare Berkualitas</p>
</header>

<div class="container" id="product-list"></div>

<div class="more-text">
dan masih banyak lagi barang-barang lainnya
</div>

<!-- MODAL -->
<div id="modal" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <h3 id="modal-title"></h3>

    <!-- PILIHAN SATUAN -->
    <label>Pilih Satuan:</label>
    <select id="satuan" onchange="updatePrice()">
      <option value="pcs">PCS</option>
      <option value="karton">Karton</option>
    </select>

    <p id="modal-price"></p>

    <button onclick="addToCart()">Tambah</button>
  </div>
</div>

<script>
let products = [
{name:"Sabun Homecare", pcs:25000, karton:280000, rating:5},
{name:"Detergen Cair", pcs:35000, karton:400000, rating:4},
{name:"Pembersih Lantai", pcs:30000, karton:330000, rating:4},
{name:"Sabun Cuci Piring", pcs:10000, karton:110000, rating:5}
];

let cart = [];
let selectedProduct = null;

function renderProducts(){
let list = document.getElementById("product-list");
list.innerHTML = "";

products.forEach(p=>{
list.innerHTML += `
<div class="card">
<img src="https://via.placeholder.com/200">
<h3>${p.name}</h3>
<p>Mulai Rp ${p.pcs}</p>
<button onclick="openModal('${p.name}')">Detail</button>
</div>
`;
});
}

function openModal(nama){
selectedProduct = products.find(p=>p.name===nama);
document.getElementById("modal-title").innerText = nama;
document.getElementById("modal").style.display="flex";
updatePrice();
}

function updatePrice(){
let satuan = document.getElementById("satuan").value;
let harga = selectedProduct[satuan];
document.getElementById("modal-price").innerText = "Harga: Rp "+harga;
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function addToCart(){
let satuan = document.getElementById("satuan").value;
let harga = selectedProduct[satuan];

cart.push({
nama:selectedProduct.name,
harga:harga,
satuan:satuan,
qty:1
});

alert("Ditambahkan!");
closeModal();
}

renderProducts();
</script>

</body>
</html>
