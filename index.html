<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EVI STORE MANOKWARI</title>
<style>
body { font-family: Arial; margin:0; background:#f5f5f5;}
header { background:#4CAF50; color:white; padding:15px; text-align:center;}
.container { padding:10px;}
.card { background:white; padding:10px; margin:10px 0; border-radius:10px;}
input, button { padding:10px; margin:5px 0; width:100%;}
button { background:#4CAF50; color:white; border:none; border-radius:5px;}
img { width:100%; max-height:150px; object-fit:cover;}
</style>
</head>

<body>

<header>
<h2>🛒 EVI STORE MANOKWARI</h2>
</header>

<div class="container">

<h3>Tambah Produk</h3>
<input id="nama" placeholder="Nama Produk">
<input id="harga" type="number" placeholder="Harga">
<input id="stok" type="number" placeholder="Stok Awal">
<input id="foto" placeholder="Link Foto (URL)">
<button onclick="tambahProduk()">Tambah</button>

<h3>Daftar Produk</h3>
<div id="list"></div>

</div>

<script>
let produk = JSON.parse(localStorage.getItem("produk")) || [];

function simpan() {
  localStorage.setItem("produk", JSON.stringify(produk));
}

function tampil() {
  let html = "";
  produk.forEach((p, i) => {
    html += `
    <div class="card">
      <img src="${p.foto}">
      <h4>${p.nama}</h4>
      <p>Harga: Rp ${p.harga}</p>
      <p>Stok: ${p.stok}</p>

      <input type="number" placeholder="Barang Masuk" onchange="masuk(${i}, this.value)">
      <input type="number" placeholder="Barang Keluar" onchange="keluar(${i}, this.value)">

      <button onclick="hapus(${i})">Hapus</button>
      <button onclick="share(${i})">Share WA</button>
    </div>
    `;
  });
  document.getElementById("list").innerHTML = html;
}

function tambahProduk() {
  let p = {
    nama: nama.value,
    harga: harga.value,
    stok: parseInt(stok.value),
    foto: foto.value
  };
  produk.push(p);
  simpan();
  tampil();
}

function masuk(i, val) {
  produk[i].stok += parseInt(val || 0);
  simpan();
  tampil();
}

function keluar(i, val) {
  let keluar = parseInt(val || 0);
  if (produk[i].stok - keluar < 0) {
    alert("Stok tidak cukup!");
    return;
  }
  produk[i].stok -= keluar;
  simpan();
  tampil();
}

function hapus(i) {
  produk.splice(i, 1);
  simpan();
  tampil();
}

function share(i) {
  let p = produk[i];
  let text = `🛒 ${p.nama}
Harga: Rp ${p.harga}
Stok: ${p.stok}`;
  window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
}

tampil();
</script>

</body>
</html>
