<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EVI STORE MANOKWARI</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f5f5f5;
}

/* HEADER */
header {
  background: linear-gradient(135deg, #ff6600, #ff9900);
  color: white;
  text-align: center;
  padding: 20px;
}

/* ICON KERANJANG */
#cart-icon {
  position: fixed;
  top: 15px;
  right: 20px;
  font-size: 22px;
  cursor: pointer;
}

#cart-count {
  background: red;
  color: white;
  padding: 3px 7px;
  border-radius: 50%;
  font-size: 12px;
}

/* POPUP CART */
#cart-popup {
  position: fixed;
  right: 20px;
  top: 60px;
  width: 300px;
  background: white;
  border-radius: 10px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.3);
  display: none;
  padding: 15px;
}

.cart-item {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

.cart-item button {
  background: red;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

/* PRODUK GRID */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  overflow: hidden;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

.card h3 {
  margin: 10px;
  font-size: 14px;
}

.card p {
  margin: 10px;
  color: #ff6600;
  font-weight: bold;
}

.card button {
  margin: 10px;
  padding: 8px;
  width: 90%;
  border: none;
  background: #25D366;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

/* CHECKOUT */
.checkout {
  text-align: center;
  margin-top: 10px;
}

.checkout button {
  width: 100%;
  padding: 10px;
  background: #ff6600;
  color: white;
  border: none;
  border-radius: 6px;
}
</style>
</head>

<body>

<!-- ICON CART -->
<div id="cart-icon" onclick="toggleCart()">
🛒 <span id="cart-count">0</span>
</div>

<!-- POPUP CART -->
<div id="cart-popup">
  <h3>Keranjang</h3>
  <div id="cart-items"></div>
  <p>Total: Rp <span id="total">0</span></p>
  
  <div class="checkout">
    <button onclick="checkout()">Checkout</button>
  </div>
</div>

<header>
  <h1>EVI STORE MANOKWARI</h1>
  <p>Produk Homecare Berkualitas</p>
</header>

<h2 style="text-align:center;">Produk Kami</h2>

<div class="container">

<!-- PRODUK -->
<script>
const products = [
["Sabun Homecare",25000],
["Detergen Cair",35000],
["Pembersih Lantai",30000],
["Sabun Cuci Piring",10000],
["Deterjen Ekonomis",20000],
["Pewangi Laundry",25000],
["Pembersih Lantai Hemat",15000]
];

document.write(products.map(p=>`
<div class="card">
<img src="https://via.placeholder.com/200">
<h3>${p[0]}</h3>
<p>Rp ${p[1]}</p>
<button onclick="addToCart('${p[0]}',${p[1]})">+ Keranjang</button>
</div>
`).join(""));
</script>

</div>

<script>
let cart = [];

function addToCart(nama, harga){
  cart.push({nama,harga});
  updateCart();
}

function updateCart(){
  let items = document.getElementById("cart-items");
  let total = 0;

  items.innerHTML = "";

  cart.forEach((item,index)=>{
    total += item.harga;

    items.innerHTML += `
    <div class="cart-item">
      ${item.nama} 
      <button onclick="removeItem(${index})">X</button>
    </div>
    `;
  });

  document.getElementById("cart-count").innerText = cart.length;
  document.getElementById("total").innerText = total;
}

function removeItem(index){
  cart.splice(index,1);
  updateCart();
}

function toggleCart(){
  let popup = document.getElementById("cart-popup");
  popup.style.display = popup.style.display === "block" ? "none" : "block";
}

function checkout(){
  if(cart.length === 0){
    alert("Keranjang kosong!");
    return;
  }

  let pesan = "Halo, saya ingin pesan:%0A";
  let total = 0;

  cart.forEach((item,i)=>{
    pesan += (i+1)+". "+item.nama+" - Rp "+item.harga+"%0A";
    total += item.harga;
  });

  pesan += "%0ATotal: Rp "+total;

  window.open("https://wa.me/6282285712293?text="+pesan);
}
</script>

</body>
</html>
