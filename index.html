<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toko Sultan</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

/* Navbar */
.navbar {
  background: #111;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 18px;
}

/* Button Admin */
.admin-btn {
  position: fixed;
  top: 10px;
  right: 10px;
  background: gold;
  padding: 8px;
  border-radius: 8px;
  cursor: pointer;
}

/* Search */
.search-box {
  padding: 10px;
}

.search-box input {
  width: 100%;
  padding: 8px;
  border-radius: 8px;
}

/* Produk */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px,1fr));
  gap: 10px;
  padding: 10px;
}

.produk {
  background: white;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
}

.produk img {
  width: 100%;
}

.harga {
  color: red;
  font-weight: bold;
}

/* Cart */
.cart {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  padding: 10px;
  border-top: 2px solid #ccc;
}

/* Popup Admin */
.popup {
  display: none;
  position: fixed;
  top: 20%;
  left: 10%;
  width: 80%;
  background: white;
  padding: 15px;
  border-radius: 10px;
}

.popup input {
  width: 100%;
  margin: 5px 0;
  padding: 8px;
}
</style>

</head>
<body>

<div class="navbar">👑 TOKO SULTAN</div>
<div class="admin-btn" onclick="bukaAdmin()">+ Produk</div>

<div class="search-box">
  <input type="text" id="search" placeholder="Cari..." onkeyup="cari()">
</div>

<div class="container" id="produk"></div>

<div class="cart">
  Total: Rp <span id="total">0</span>
  <button onclick="checkout()">Checkout</button>
</div>

<!-- Popup Admin -->
<div class="popup" id="popup">
  <h3>Tambah Produk</h3>
  <input id="nama" placeholder="Nama produk">
  <input id="harga" placeholder="Harga">
  <input id="gambar" placeholder="Link gambar">
  <button onclick="tambahProduk()">Simpan</button>
</div>

<script>
let data = JSON.parse(localStorage.getItem("produk")) || [
  {
    nama:"Sunlight",
    harga:10000,
    gambar:"https://i.ibb.co/FLfZwRHd/623cb0a1b0f536e26daf040d290fa49a-jpg-720x720q80-jpg.webp"
  },
  {
    nama:"Dettol Floor Cleaner",
    harga:18000,
    gambar:"https://i.ibb.co/9HcY9T3x/CM-DETTUB1062-Dettol-Floor-Cleaner-Lavender-Pouch-700-m-L.webp"
  }
];

let total = 0;
let pesanan = "";

function tampil(){
  let html="";
  data.forEach((p,i)=>{
    html += `
    <div class="produk">
      <img src="${p.gambar}">
      <h4>${p.nama}</h4>
      <div class="harga">Rp ${p.harga}</div>
      <button onclick="beli(${i})">Tambah</button>
    </div>`;
  });
  document.getElementById("produk").innerHTML = html;
}
tampil();

function beli(i){
  total += data[i].harga;
  pesanan += data[i].nama + "%0A";
  document.getElementById("total").innerText = total;
}

function checkout(){
  window.location.href = "https://wa.me/628xxxx?text=Pesanan:%0A"+pesanan+"Total: Rp "+total;
}

function bukaAdmin(){
  document.getElementById("popup").style.display="block";
}

function tambahProduk(){
  let n = document.getElementById("nama").value;
  let h = document.getElementById("harga").value;
  let g = document.getElementById("gambar").value;

  data.push({nama:n,harga:parseInt(h),gambar:g});
  localStorage.setItem("produk", JSON.stringify(data));
  tampil();
  document.getElementById("popup").style.display="none";
}

function cari(){
  let input = document.getElementById("search").value.toLowerCase();
  let items = document.getElementsByClassName("produk");

  for(let i=0;i<items.length;i++){
    let text = items[i].innerText.toLowerCase();
    items[i].style.display = text.includes(input) ? "" : "none";
  }
}
</script>

</body>
</html>
